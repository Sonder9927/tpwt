[project]
name = "tpwt"
version = "0.2.0"
description = "tpwt in python with rust"
authors = [{ name = "Sonder Merak", email = "merak19981999@gmail.com" }]
dependencies = ["icecream>=2.1.3"]
readme = "README.md"
requires-python = ">= 3.12"

[build-system]
requires = ["maturin>=1.2,<2.0"]
build-backend = "maturin"

[tool.rye]
managed = true
dev-dependencies = ["pip>=23.3.1"]

[tool.maturin]
python-source = "python"
module-name = "tpwt._lowlevel"
features = ["pyo3/extension-module"]

[project.scripts]
# tpwt-main = "tpwt:main"

[tool.rye.scripts]
temp = "python temp.py"
